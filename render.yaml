services:
  - type: web
    name: fiyoauth
    env: node
    region: oregon
    buildCommand: "npm install"
    startCommand: "node index.js"
    plan: free
    autoDeploy: true
    healthCheckPath: "/api"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: AUTH_DB_URI
        value: ""
      - key: REFRESH_TOKEN_SECRET
        value: ""
      - key: ACCESS_TOKEN_SECRET
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_EMAIL
        value: ""
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: FIYOCDN_IMG_BASEURL
        value: ""